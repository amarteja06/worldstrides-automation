name: Student Registration

on:
  schedule:
    - cron: '30 19 * * *'   # 1:00 AM IST
    - cron: '30 0 * * *'    # 6:00 AM IST
    - cron: '30 8 * * *'    # 2:00 PM IST
    - cron: '30 12 * * *'   # 6:00 PM IST

  workflow_dispatch:

jobs:
  run-test:

    runs-on: windows-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # -------------------------
      # First Attempt
      # -------------------------

      - name: Run Student Registration (Attempt 1)
        id: attempt1
        continue-on-error: true
        run: mvn test -Dheadless=true -Dtest=StudentRegistrationTest

      # -------------------------
      # Retry After 2 Minutes
      # -------------------------

      - name: Wait Before Retry
        if: steps.attempt1.outcome == 'failure'
        shell: cmd
        run: timeout /t 120

      - name: Retry Student Registration
        if: steps.attempt1.outcome == 'failure'
        run: mvn test -Dheadless=true -Dtest=StudentRegistrationTest

      # -------------------------
      # Upload Artifacts
      # -------------------------

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Registration-Proof
          path: |
            screenshots/
            credentials.txt

      # -------------------------
      # Success Email
      # -------------------------

      - name: Send Success Email
        if: success()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true

          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}

          subject: "✅ Customer Portal Registration Success"

          to:
            Amarteja.Chennu@infinite.com ,
            Boddu.Chandankumar@infinite.com,
            Chandu.Deeti@infinite.com

          from: ${{ secrets.GMAIL_USER }}

          body: |
            ✅ Customer Portal Registration Success

            Status : SUCCESS

            Registration completed successfully.

            Username and Password are attached.

            Screenshot attached.

            Regards,
            QA Automation Suite

          attachments: |
            screenshots/congratulations.png
            credentials.txt

      # -------------------------
      # Failure Email
      # -------------------------

      - name: Send Failure Email
        if: failure()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true

          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}

          subject: "❌ Customer Portal Registration Failed"

          to: Amarteja.Chennu@infinite.com
          from: ${{ secrets.GMAIL_USER }}

          body: |
            ❌ Customer Portal Registration Failed

            Status : FAILED

            Registration did not complete successfully.

            Please review the GitHub Actions logs.

            Screenshot attached.

            Regards,
            QA Automation Suite

          attachments: |
            screenshots/failure.png
            credentials.txt