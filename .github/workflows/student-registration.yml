name: Student Registration

on:
  schedule:
    - cron: '30 19 * * *'   # 1:00 AM IST
    - cron: '30 0 * * *'    # 6:00 AM IST
    - cron: '30 8 * * *'    # 2:00 PM IST
    - cron: '30 12 * * *'   # 6:00 PM IST

  workflow_dispatch:

jobs:
  run-test:
    runs-on: windows-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # -------------------------
      # First Attempt
      # -------------------------

      - name: Run Student Registration (Attempt 1)
        id: attempt1
        continue-on-error: true
        run: mvn test -Dheadless=true -Dtest=StudentRegistrationTest

      # -------------------------
      # Wait Before Retry
      # -------------------------

      - name: Wait 2 Minutes Before Retry
        if: steps.attempt1.outcome == 'failure'
        shell: cmd
        run: timeout /t 120

      # -------------------------
      # Retry
      # -------------------------

      - name: Retry Student Registration
        if: steps.attempt1.outcome == 'failure'
        run: mvn test -Dheadless=true -Dtest=StudentRegistrationTest

      # -------------------------
      # Upload Screenshot
      # -------------------------

      - name: Upload Screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CustomerPortal-Screenshot
          path: screenshots/

      # -------------------------
      # Success Email
      # -------------------------

      - name: Send Success Email
        if: success()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true

          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}

          subject: "✅ WorldStrides Customer Portal - Registration Successful"

          to: Amarteja.Chennu@infinite.com
          from: ${{ secrets.GMAIL_USER }}

          body: |
            ✅ WorldStrides Customer Portal Registration

            Status      : SUCCESS

            Execution   : GitHub Actions

            Result      : Registration completed successfully.

            Screenshot is attached.

            Regards,
            QA Automation Suite

          attachments: screenshots/congratulations.png

      # -------------------------
      # Failure Email
      # -------------------------

      - name: Send Failure Email
        if: failure()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true

          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}

          subject: "❌ WorldStrides Customer Portal - Registration Failed"

          to: Amarteja.Chennu@infinite.com
          from: ${{ secrets.GMAIL_USER }}

          body: |
            ❌ WorldStrides Customer Portal Registration

            Status      : FAILED

            Execution   : GitHub Actions

            The registration failed even after an automatic retry.

            Please review the GitHub Actions logs.

            Regards,
            QA Automation Suite

          attachments: screenshots/failure.png
